server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml;

    # Hashed assets — immutable, long cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pagefind search index
    location /pagefind/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Static assets with hashes (JS, CSS bundles)
    location ~* \.[0-9a-f]{8,}\.(js|css|woff2?|png|jpg|webp|svg|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Non-hashed static assets
    location ~* \.(ico|png|jpg|webp|svg|avif|woff2?|ttf|eot|xml|txt)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback for Astro SWUP client-side routing
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Custom 404 page if exists
    error_page 404 /404.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
