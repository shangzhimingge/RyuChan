server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml;

    # Hashed assets — immutable, long cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pagefind search index
    location /pagefind/ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Astro static site routing:
    # $uri → exact file match
    # $uri.html → .html extension-less URLs (e.g. /about → /about.html)
    # $uri/ → trailing-slash directories (e.g. /blog/post/ → /blog/post/index.html)
    # =404 → return 404 page for missing paths instead of SPA fallback
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Custom 404 page
    error_page 404 /404.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
